<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Must be FIRST script: suppress ResizeObserver loop noise before React overlay loads -->
    <script>
      (function () {
        // "ResizeObserver loop completed with undelivered notifications" is a
        // harmless browser notice emitted by Ant Design internals. React's dev
        // overlay treats every window error as fatal, so we intercept it here
        // — before the bundle even loads — so React never sees it.
        var ro = window.onerror;
        window.onerror = function (msg, src, line, col, err) {
          if (typeof msg === 'string' && msg.indexOf('ResizeObserver loop') !== -1) {
            return true; // returning true prevents the browser default (and React overlay)
          }
          return ro ? ro(msg, src, line, col, err) : false;
        };
        window.addEventListener('error', function (e) {
          if (e.message && e.message.indexOf('ResizeObserver loop') !== -1) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true); // capture phase — runs before React's bubble-phase listener
      })();
    </script>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fef9ee" />
    <meta
      name="description"
      content="WalletWatch — Track your expenses and income with ease. Visualize your spending patterns and save more."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->

      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
